<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>LOA NTI Dashboard</title>
    <style>
        :root { --primary: #4285f4; --bg: #f8f9fa; --card-bg: #ffffff; }
        body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        
        /* 메뉴 스타일 */
        .tabs { display: flex; flex-wrap: wrap; border-bottom: 2px solid #eee; margin-bottom: 20px; gap: 5px; }
        .tab-btn { padding: 12px 18px; cursor: pointer; border: none; background: #f0f0f0; border-radius: 8px 8px 0 0; font-weight: 600; transition: 0.2s; }
        .tab-btn.active { background: var(--primary); color: white; }

        /* 콘텐츠 및 그리드 */
        .content { display: none; }
        .content.active { display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-top: 20px; }
        
        /* 캐릭터 카드 (App Script 디자인 반영) */
        .card { border: 1px solid #e1e4e8; padding: 20px; border-radius: 10px; background: var(--card-bg); transition: transform 0.2s; }
        .card:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .char-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .name { font-size: 1.2em; font-weight: bold; color: #1a1a1a; }
        .class { font-size: 0.85em; color: #666; background: #f0f0f0; padding: 2px 8px; border-radius: 4px; }
        .level { color: var(--primary); font-weight: 800; font-size: 1.15em; margin: 5px 0; }
        
        /* 아크 패시브/그리드 스타일 (App Script 색상 로직) */
        .info-box { font-size: 0.85em; line-height: 1.6; margin-top: 10px; padding-top: 10px; border-top: 1px solid #f0f0f0; }
        .label { font-weight: bold; color: #555; display: inline-block; width: 70px; }
        .ark-passive-text { color: #E65A5A; font-weight: 600; } /* 5랭크 이하 강조색 */
        .grid-point { font-weight: bold; }
        
        /* 로딩 애니메이션 */
        .loading { text-align: center; padding: 40px; color: #999; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎮 LOA NTI Dashboard</h1>
    <div class="tabs" id="tabMenu">
        <button class="tab-btn active" onclick="openTab(event, 'NTI')">NTI 전체</button>
    </div>

    <div id="tabContents">
        <div id="NTI" class="content active">
            <h2>📊 NTI 전체 현황</h2>
            <p>멤버별 대표 캐릭터들의 레벨 및 전투력을 비교합니다.</p>
            <div id="NTI-Summary"></div>
        </div>
    </div>
</div>

<script>
    // [설정] 멤버 및 대표 닉네임
    const MEMBERS = {
        "기태": "로우프", "동근": "저녁별빛", "민구": "그저애송이", "민기": "minki", "석준": "famousamos", "준영": "DD키리", "찬엽": "탑소라카"
    };

    // [중요] API KEY 입력 (Bearer 포함)
    const API_KEY = "eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiIsIng1dCI6IktYMk40TkRDSTJ5NTA5NWpjTWk5TllqY2lyZyIsImtpZCI6IktYMk40TkRDSTJ5NTA5NWpjTWk5TllqY2lyZyJ9.eyJpc3MiOiJodHRwczovL2x1ZHkuZ2FtZS5vbnN0b3ZlLmNvbSIsImF1ZCI6Imh0dHBzOi8vbHVkeS5nYW1lLm9uc3RvdmUuY29tL3Jlc291cmNlcyIsImNsaWVudF9pZCI6IjEwMDAwMDAwMDA1OTA2ODYifQ.oGh7TNKFkdANL7nZJbKMAqjmQBO_EauyWaRDuq0QJQ2l0sABfpTTKvYEdkixZ8hZqW5iVN_mDIsYdI6pcnIJ-w3j7EFTI8GKdUNo-QVn412LALUhx_gXd-a2WekBYtDgjZAaAfmjqal63JjfoXdJYz5mNRZX9bqkcpuX7gkSDU9bi7Bvik4gmT4kEt6WJ1sOnch8Bbi3bDGLUoXEbRjWiebszAdo2qmsg6sXu3Ah26PhMsosIzkPaW0y5wBDnSOQtt2N4sEFNO0jiwzfaygOO4pu6jQFzTsUjL4xNBKtqpB1HS5gpxadAwJD1umBEMaF-BQZEu3pdu9Ja8MvDpqfUg";
    const BASE_URL = "https://developer-lostark.game.onstove.com";

    function init() {
        const menu = document.getElementById('tabMenu');
        const container = document.getElementById('tabContents');

        Object.keys(MEMBERS).forEach(name => {
            // 메뉴 추가
            const btn = document.createElement('button');
            btn.className = 'tab-btn';
            btn.innerText = name;
            btn.onclick = (e) => openTab(e, name);
            menu.appendChild(btn);

            // 콘텐츠 영역 추가
            const content = document.createElement('div');
            content.id = name;
            content.className = 'content';
            content.innerHTML = `<h2>👤 ${name}의 원정대 (${MEMBERS[name]})</h2><div class="grid" id="grid-${name}"><p class="loading">데이터를 불러오는 중...</p></div>`;
            container.appendChild(content);
        });
    }

    async function openTab(evt, tabName) {
        document.querySelectorAll(".content").forEach(c => c.classList.remove("active"));
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        document.getElementById(tabName).classList.add("active");
        evt.currentTarget.classList.add("active");

        if (MEMBERS[tabName]) fetchMemberFullData(tabName, MEMBERS[tabName]);
    }

    // [이식 로직] App Script의 캐릭터/아크패시브/그리드 통합 조회
    async function fetchMemberFullData(mName, cName) {
        const grid = document.getElementById(`grid-${mName}`);
        const options = { headers: { "Authorization": API_KEY } };

        try {
            // 1. 원정대 캐릭터 목록 조회
            const sibRes = await fetch(`${BASE_URL}/characters/${encodeURIComponent(cName)}/siblings`, options);
            const siblings = await sibRes.json();
            
            // 1640 이상만 필터링 및 정렬
            const targets = siblings
                .filter(c => parseFloat(c.ItemAvgLevel.replace(/,/g, "")) >= 1640)
                .sort((a, b) => parseFloat(b.ItemAvgLevel.replace(/,/g, "")) - parseFloat(a.ItemAvgLevel.replace(/,/g, "")));

            grid.innerHTML = ""; // 로딩 문구 제거

            for (const char of targets) {
                // 2. 프로필(전투력) 및 아크패시브 정보 동시 조회 (Promise.all로 속도 최적화)
                const [pRes, apRes, agRes] = await Promise.all([
                    fetch(`${BASE_URL}/armories/characters/${encodeURIComponent(char.CharacterName)}/profiles`, options),
                    fetch(`${BASE_URL}/armories/characters/${encodeURIComponent(char.CharacterName)}/arkpassive`, options),
                    fetch(`${BASE_URL}/armories/characters/${encodeURIComponent(char.CharacterName)}/arkgrid`, options)
                ]);

                const pData = await pRes.json();
                const apData = await apRes.json();
                const agData = await agRes.json();

                // 전투력 계산 (App Script 로직)
                let cp = pData?.CombatPower?.Value || pData?.CombatPower || 0;
                cp = Number(parseFloat(String(cp).replace(/,/g, "")).toFixed(0)).toLocaleString();

                // 아크 패시브 가공
                let arkPassiveHtml = "비활성화";
                if (apData?.Points) {
                    arkPassiveHtml = apData.Points.map(p => {
                        const m = (p.Description || "").match(/(\d+)랭크/);
                        const rank = m ? parseInt(m[1]) : 0;
                        // 5랭크 이하 빨간색 강조 (App Script 조건)
                        return `<span style="color: ${rank <= 5 ? '#E65A5A' : '#2ecc71'}">${p.Name} ${rank}R</span>`;
                    }).join(" / ");
                }

                // 아크 그리드 가공 (간소화 이식)
                let gridHtml = "데이터 없음";
                if (agData?.Slots) {
                    gridHtml = agData.Slots.map(s => `<b>${s.Name[0]}</b>${s.Point}P`).join(" ");
                }

                // 카드 생성
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="char-header">
                        <span class="name">${char.CharacterName}</span>
                        <span class="class">${char.CharacterClassName}</span>
                    </div>
                    <div class="level">Lv. ${char.ItemAvgLevel}</div>
                    <div class="info-box">
                        <div><span class="label">전투력</span> ${cp}</div>
                        <div><span class="label">아크패시브</span> <span class="ark-passive-text">${arkPassiveHtml}</span></div>
                        <div><span class="label">아크그리드</span> ${gridHtml}</div>
                        <div style="font-size:0.8em; color:#999; margin-top:5px;">서버: ${char.ServerName}</div>
                    </div>
                `;
                grid.appendChild(card);
            }
        } catch (e) {
            grid.innerHTML = `<p style="color:red">데이터 로드 실패: API 키 혹은 닉네임을 확인하세요.</p>`;
        }
    }

    window.onload = init;
</script>
</body>
</html>
