<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOA NTI Dashboard</title>
    <style>
        :root { --primary: #4285f4; --bg: #f8f9fa; --card-bg: #ffffff; --danger: #E65A5A; --success: #2ecc71; }
        body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        
        /* 탭 메뉴 스타일 */
        .tabs { display: flex; flex-wrap: wrap; border-bottom: 2px solid #eee; margin-bottom: 20px; gap: 5px; }
        .tab-btn { padding: 12px 18px; cursor: pointer; border: none; background: #f0f0f0; border-radius: 8px 8px 0 0; font-weight: 600; transition: 0.2s; }
        .tab-btn.active { background: var(--primary); color: white; }
        .tab-btn:hover:not(.active) { background: #e0e0e0; }

        /* 콘텐츠 영역 */
        .content { display: none; min-height: 400px; }
        .content.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 캐릭터 카드 그리드 */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { border: 1px solid #e1e4e8; padding: 20px; border-radius: 10px; background: var(--card-bg); transition: transform 0.2s; }
        .card:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        .char-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .name { font-size: 1.2em; font-weight: bold; }
        .class { font-size: 0.85em; color: #666; background: #f0f0f0; padding: 2px 8px; border-radius: 4px; }
        .level { color: var(--primary); font-weight: 800; font-size: 1.15em; margin: 5px 0; }
        
        .info-box { font-size: 0.85em; line-height: 1.6; margin-top: 10px; padding-top: 10px; border-top: 1px solid #f0f0f0; }
        .label { font-weight: bold; color: #555; display: inline-block; width: 80px; }
        
        .loading { text-align: center; padding: 50px; color: #999; font-style: italic; }
        .error-msg { color: var(--danger); padding: 20px; border: 1px solid var(--danger); border-radius: 8px; background: #fff5f5; line-height: 1.5; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎮 LOA NTI Dashboard</h1>
    
    <div class="tabs" id="tabMenu">
        <button class="tab-btn active" onclick="openTab(event, 'NTI')">NTI 전체</button>
    </div>

    <div id="tabContents">
        <div id="NTI" class="content active">
            <h2>📊 NTI 전체 대시보드</h2>
            <p>멤버별 현황을 한눈에 확인합니다. (데이터 로드 대기 중...)</p>
            <div id="NTI-Summary"></div>
        </div>
    </div>
</div>

<script>
    /**
     * [설정 영역] 멤버와 API 정보
     */
    const MEMBERS = {
        "기태": "로우프",
        "동근": "저녁별빛",
        "민구": "그저애송이",
        "민기": "minki",
        "석준": "famousamos",
        "준영": "DD키리",
        "찬엽": "탑소라카"
    };

    // [중요] 'Bearer '와 '키' 사이에 공백이 있는지 반드시 확인하세요!
    const API_KEY = "Bearer eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiIsIng1dCI6IktYMk40TkRDSTJ5NTA5NWpjTWk5TllqY2lyZyIsImtpZCI6IktYMk40TkRDSTJ5NTA5NWpjTWk5TllqY2lyZyJ9.eyJpc3MiOiJodHRwczovL2x1ZHkuZ2FtZS5vbnN0b3ZlLmNvbSIsImF1ZCI6Imh0dHBzOi8vbHVkeS5nYW1lLm9uc3RvdmUuY29tL3Jlc291cmNlcyIsImNsaWVudF9pZCI6IjEwMDAwMDAwMDA1OTA2ODYifQ.oGh7TNKFkdANL7nZJbKMAqjmQBO_EauyWaRDuq0QJQ2l0sABfpTTKvYEdkixZ8hZqW5iVN_mDIsYdI6pcnIJ-w3j7EFTI8GKdUNo-QVn412LALUhx_gXd-a2WekBYtDgjZAaAfmjqal63JjfoXdJYz5mNRZX9bqkcpuX7gkSDU9bi7Bvik4gmT4kEt6WJ1sOnch8Bbi3bDGLUoXEbRjWiebszAdo2qmsg6sXu3Ah26PhMsosIzkPaW0y5wBDnSOQtt2N4sEFNO0jiwzfaygOO4pu6jQFzTsUjL4xNBKtqpB1HS5gpxadAwJD1umBEMaF-BQZEu3pdu9Ja8MvDpqfUg";
    const BASE_URL = "https://developer-lostark.game.onstove.com";

    /**
     * 1. 초기화: 탭 메뉴 및 콘텐츠 생성
     */
    function init() {
        const menu = document.getElementById('tabMenu');
        const container = document.getElementById('tabContents');

        // 멤버별 탭 생성
        Object.keys(MEMBERS).forEach(name => {
            const btn = document.createElement('button');
            btn.className = 'tab-btn';
            btn.innerText = name;
            btn.onclick = (e) => openTab(e, name);
            menu.appendChild(btn);

            const content = document.createElement('div');
            content.id = name;
            content.className = 'content';
            content.innerHTML = `<h2>👤 ${name} (${MEMBERS[name]})</h2><div class="grid" id="grid-${name}"><p class="loading">탭을 클릭하면 데이터를 불러옵니다.</p></div>`;
            container.appendChild(content);
        });

        // 추가 기능 탭 (수집품, 클리어골드)
        ["수집품", "클리어골드"].forEach(extra => {
            const btn = document.createElement('button');
            btn.className = 'tab-btn';
            btn.innerText = extra;
            btn.onclick = (e) => openTab(e, extra);
            menu.appendChild(btn);

            const content = document.createElement('div');
            content.id = extra;
            content.className = 'content';
            content.innerHTML = `<h2>✨ ${extra}</h2><div id="data-${extra}">데이터 연동 준비 중입니다.</div>`;
            container.appendChild(content);
        });
    }

    /**
     * 2. 탭 전환 이벤트
     */
    async function openTab(evt, tabName) {
        document.querySelectorAll(".content").forEach(c => c.classList.remove("active"));
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        
        document.getElementById(tabName).classList.add("active");
        evt.currentTarget.classList.add("active");

        // 멤버 탭일 경우 실시간 데이터 로드
        if (MEMBERS[tabName]) {
            fetchMemberFullData(tabName, MEMBERS[tabName]);
        }
    }

    /**
     * 3. API 데이터 호출 (App Script 로직 이식)
     */
    async function fetchMemberFullData(mName, cName) {
        const grid = document.getElementById(`grid-${mName}`);
        grid.innerHTML = '<p class="loading">로스트아크 서버에서 데이터를 가져오는 중...</p>';

        const headers = {
            "accept": "application/json",
            "Authorization": API_KEY
        };

        try {
            // 원정대 목록 조회
            const sibRes = await fetch(`${BASE_URL}/characters/${encodeURIComponent(cName)}/siblings`, { headers });
            
            if (sibRes.status === 401) throw new Error("인증 실패(401): API 키 형식을 확인하세요. (Bearer 한 칸 띄우고 키)");
            if (!sibRes.ok) throw new Error(`서버 응답 오류: ${sibRes.status}`);

            const siblings = await sibRes.json();
            if (!Array.isArray(siblings)) throw new Error("캐릭터 정보를 찾을 수 없습니다.");

            // 1640 이상 캐릭터 필터링 및 정렬
            const targets = siblings
                .filter(c => parseFloat(c.ItemAvgLevel.replace(/,/g, "")) >= 1640)
                .sort((a, b) => parseFloat(b.ItemAvgLevel.replace(/,/g, "")) - parseFloat(a.ItemAvgLevel.replace(/,/g, "")));

            grid.innerHTML = ""; // 로딩 문구 제거

            for (const char of targets) {
                // 프로필 및 아크패시브 상세 정보 호출
                const [pRes, apRes] = await Promise.all([
                    fetch(`${BASE_URL}/armories/characters/${encodeURIComponent(char.CharacterName)}/profiles`, { headers }),
                    fetch(`${BASE_URL}/armories/characters/${encodeURIComponent(char.CharacterName)}/arkpassive`, { headers })
                ]);

                const pData = await pRes.json();
                const apData = await apRes.json();

                // 전투력 가공
                let cp = pData?.CombatPower?.Value || pData?.CombatPower || 0;
                cp = Number(parseFloat(String(cp).replace(/,/g, "")).toFixed(0)).toLocaleString();

                // 아크패시브 가공
                let arkHtml = "비활성화";
                if (apData?.Points) {
                    arkHtml = apData.Points.map(p => {
                        const m = (p.Description || "").match(/(\d+)랭크/);
                        const r = m ? parseInt(m[1]) : 0;
                        return `<span style="color:${r <= 5 ? 'var(--danger)' : 'var(--success)'}">${p.Name} ${r}R</span>`;
                    }).join(" / ");
                }

                // 카드 HTML 생성
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="char-header">
                        <span class="name">${char.CharacterName}</span>
                        <span class="class">${char.CharacterClassName}</span>
                    </div>
                    <div class="level">Lv. ${char.ItemAvgLevel}</div>
                    <div class="info-box">
                        <div><span class="label">전투력</span> ${cp}</div>
                        <div><span class="label">아크패시브</span> ${arkHtml}</div>
                        <div style="margin-top:5px; font-size:0.8em; color:#999;">서버: ${char.ServerName}</div>
                    </div>
                `;
                grid.appendChild(card);
            }
        } catch (e) {
            grid.innerHTML = `<div class="error-msg">❌ <b>에러 발생</b><br>${e.message}<br><br><small>F12 콘솔창에서 더 자세한 원인을 확인할 수 있습니다.</small></div>`;
            console.error(e);
        }
    }

    // 페이지 로드 시 초기화 실행
    window.onload = init;
</script>

</body>
</html>
