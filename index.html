<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>LOA NTI Dashboard</title>
    <style>
        :root { --primary: #4285f4; --dark: #333; --light: #f4f4f9; }
        body { font-family: 'Pretendard', sans-serif; background: var(--light); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        /* 탭 스타일 */
        .tabs { display: flex; flex-wrap: wrap; border-bottom: 2px solid #ddd; margin-bottom: 20px; gap: 5px; }
        .tab-btn { padding: 12px 20px; cursor: pointer; border: none; background: #eee; border-radius: 8px 8px 0 0; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: white; }
        .tab-btn:hover:not(.active) { background: #ddd; }

        /* 콘텐츠 영역 */
        .content { display: none; animation: fadeIn 0.5s; }
        .content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 캐릭터 카드 스타일 */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .card { border: 1px solid #eee; padding: 15px; border-radius: 10px; background: #fff; position: relative; }
        .level { color: var(--primary); font-weight: bold; font-size: 1.1em; }
        .class-tag { font-size: 0.85em; color: #666; background: #f0f0f0; padding: 2px 8px; border-radius: 4px; }
        .ark-info { margin-top: 10px; font-size: 0.9em; color: #E65A5A; border-top: 1px dashed #eee; padding-top: 8px; }
        
        h2 { border-left: 5px solid var(--primary); padding-left: 10px; }
        .loading { text-align: center; padding: 50px; font-weight: bold; color: #888; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎮 LOA NTI 통합 관리 시스템</h1>
    
    <div class="tabs" id="tabMenu">
        <button class="tab-btn active" onclick="openTab(event, 'NTI')">NTI 전체</button>
        </div>

    <div id="tabContents">
        <div id="NTI" class="content active">
            <h2>📊 NTI 전체 대시보드</h2>
            <p>모든 멤버의 핵심 데이터를 한눈에 확인합니다. (준비 중...)</p>
        </div>
    </div>
</div>

<script>
    // 1. 멤버 데이터 설정 (닉네임 지정)
    const MEMBERS = {
        "기태": "로우프",
        "동근": "저녁별빛",
        "민구": "그저애송이",
        "민기": "minki",
        "석준": "famousamos",
        "준영": "DD키리",
        "찬엽": "탑소라카"
    };

    const API_KEY = "eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiIsIng1dCI6IktYMk40TkRDSTJ5NTA5NWpjTWk5TllqY2lyZyIsImtpZCI6IktYMk40TkRDSTJ5NTA5NWpjTWk5TllqY2lyZyJ9.eyJpc3MiOiJodHRwczovL2x1ZHkuZ2FtZS5vbnN0b3ZlLmNvbSIsImF1ZCI6Imh0dHBzOi8vbHVkeS5nYW1lLm9uc3RvdmUuY29tL3Jlc291cmNlcyIsImNsaWVudF9pZCI6IjEwMDAwMDAwMDA1OTA2ODYifQ.oGh7TNKFkdANL7nZJbKMAqjmQBO_EauyWaRDuq0QJQ2l0sABfpTTKvYEdkixZ8hZqW5iVN_mDIsYdI6pcnIJ-w3j7EFTI8GKdUNo-QVn412LALUhx_gXd-a2WekBYtDgjZAaAfmjqal63JjfoXdJYz5mNRZX9bqkcpuX7gkSDU9bi7Bvik4gmT4kEt6WJ1sOnch8Bbi3bDGLUoXEbRjWiebszAdo2qmsg6sXu3Ah26PhMsosIzkPaW0y5wBDnSOQtt2N4sEFNO0jiwzfaygOO4pu6jQFzTsUjL4xNBKtqpB1HS5gpxadAwJD1umBEMaF-BQZEu3pdu9Ja8MvDpqfUg";
    const BASE_URL = "https://developer-lostark.game.onstove.com";

    // 2. 초기 탭 생성 및 콘텐츠 영역 준비
    function init() {
        const menu = document.getElementById('tabMenu');
        const container = document.getElementById('tabContents');

        Object.keys(MEMBERS).forEach(name => {
            // 버튼 생성
            const btn = document.createElement('button');
            btn.className = 'tab-btn';
            btn.innerText = name;
            btn.onclick = (e) => openTab(e, name);
            menu.appendChild(btn);

            // 콘텐츠 영역 생성
            const content = document.createElement('div');
            content.id = name;
            content.className = 'content';
            content.innerHTML = `<h2>👤 ${name} (${MEMBERS[name]})</h2><div class="grid" id="grid-${name}"><p class="loading">데이터를 불러오는 중...</p></div>`;
            container.appendChild(content);
        });

        // 특수 탭 추가 (골드, 수집품)
        ["클리어골드", "수집품"].forEach(type => {
            const btn = document.createElement('button');
            btn.className = 'tab-btn';
            btn.innerText = type;
            btn.onclick = (e) => openTab(e, type);
            menu.appendChild(btn);

            const content = document.createElement('div');
            content.id = type;
            content.className = 'content';
            content.innerHTML = `<h2>✨ ${type}</h2><p>이 페이지는 구글 시트 로직을 이식해야 합니다.</p>`;
            container.appendChild(content);
        });
    }

    // 3. 탭 전환 함수
    async function openTab(evt, tabName) {
        const tabcontent = document.getElementsByClassName("content");
        for (let i = 0; i < tabcontent.length; i++) tabcontent[i].classList.remove("active");

        const tablinks = document.getElementsByClassName("tab-btn");
        for (let i = 0; i < tablinks.length; i++) tablinks[i].classList.remove("active");

        document.getElementById(tabName).classList.add("active");
        evt.currentTarget.classList.add("active");

        // 멤버 탭일 경우 데이터 로드
        if (MEMBERS[tabName]) {
            fetchMemberData(tabName, MEMBERS[tabName]);
        }
    }

    // 4. 특정 멤버 데이터 가져오기 (API 호출)
    async function fetchMemberData(memberName, charName) {
        const grid = document.getElementById(`grid-${memberName}`);
        
        try {
            const res = await fetch(`${BASE_URL}/characters/${encodeURIComponent(charName)}/siblings`, {
                headers: { "Authorization": API_KEY }
            });
            const data = await res.json();

            if (!Array.isArray(data)) throw new Error("데이터 형식이 올바르지 않습니다.");

            // 1640 이상만 정렬해서 표시
            const filtered = data
                .filter(c => parseFloat(c.ItemAvgLevel.replace(/,/g, "")) >= 1640)
                .sort((a, b) => parseFloat(b.ItemAvgLevel.replace(/,/g, "")) - parseFloat(a.ItemAvgLevel.replace(/,/g, "")));

            grid.innerHTML = filtered.map(c => `
                <div class="card">
                    <span class="class-tag">${c.CharacterClassName}</span>
                    <div style="margin-top:5px;"><strong>${c.CharacterName}</strong></div>
                    <div class="level">Lv. ${c.ItemAvgLevel}</div>
                    <div class="ark-info">서버: ${c.ServerName}</div>
                </div>
            `).join('');

        } catch (e) {
            grid.innerHTML = `<p style="color:red">에러: ${e.message}</p>`;
        }
    }

    window.onload = init;
</script>

</body>
</html>
