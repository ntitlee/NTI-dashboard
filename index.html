<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>LOA NTI Dashboard - Professional</title>
    <style>
        :root { 
            --bg: #121212; --card-bg: #1e1e1e; --border: #333;
            --text: #e0e0e0; --primary: #4285f4;
            /* 등급별 색상 (살색=상아색 계열로 조정) */
            --grade-ancient: #FFE4C4; /* 고대: Bisque(살색/상아색) */
            --grade-relic: #ff4d4f;   /* 유물: 다홍색 */
            --grade-legend: #ffc107;  /* 전설: 귤색 */
            --grade-epic: #a29bfe;    /* 영웅: 보라색 */
            --grade-default: #00b4d8; /* 일반: 파랑색 */
            /* 아크패시브 명칭 색상 */
            --ap-jin: #FFDAB9;  /* 진화: 살색(PeachPuff) */
            --ap-kkae: #4da3ff; /* 깨달음: 파란색 */
            --ap-do: #52c41a;   /* 도약: 초록색 */
            --danger: #ff4d4f;  /* 6R 미만 강조색 */
        }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--text); }
        .container { max-width: 1700px; margin: 0 auto; }
        
        .tabs { display: flex; flex-wrap: wrap; border-bottom: 1px solid var(--border); margin-bottom: 20px; gap: 5px; }
        .tab-btn { padding: 10px 20px; cursor: pointer; border: none; background: #2a2a2a; color: #888; border-radius: 8px 8px 0 0; font-weight: 700; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: white; }

        /* 리스트 레이아웃 조정 (순서: 캐릭터-서버-레벨-아크패시브-아크그리드-보석) */
        .list-header { display: grid; grid-template-columns: 180px 100px 100px 320px 300px 1fr; background: #252525; padding: 12px; font-weight: 800; border-bottom: 2px solid var(--border); font-size: 0.9rem; text-align: center; }
        .list-row { display: grid; grid-template-columns: 180px 100px 100px 320px 300px 1fr; background: var(--card-bg); padding: 15px 12px; border-bottom: 1px solid var(--border); align-items: center; text-align: center; font-size: 0.85rem; }
        .list-row:hover { background: #2a2a2a; }

        .char-info { text-align: left; padding-left: 10px; }
        .char-name { font-weight: 800; color: #fff; display: block; }
        .level { font-weight: 800; color: var(--primary); }
        
        .ap-box, .ag-box, .gem-box { text-align: left; padding: 0 10px; }
        .gem-text { font-size: 0.8rem; line-height: 1.4; color: #bbb; }

        /* 아크그리드 스타일 */
        .ag-group { margin-bottom: 5px; display: block; border-bottom: 1px hidden #333; }
        .ag-slot { display: inline-flex; align-items: center; margin-right: 12px; }
        .ag-icon { width: 16px; height: 16px; margin-right: 4px; border-radius: 2px; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="color: #fff; margin-bottom: 25px;">📊 LOA NTI Dashboard</h1>
    <div class="tabs" id="tabMenu"><button class="tab-btn active" onclick="openTab(event, 'NTI')">NTI 전체</button></div>
    <div id="tabContents">
        <div id="NTI" class="content active">
            <div id="NTI-Summary"></div>
        </div>
    </div>
</div>

<script>
    const MEMBERS = { "기태": "로우프", "동근": "저녁별빛", "민구": "그저애송이", "민기": "minki", "석준": "famousamos", "준영": "DD키리", "찬엽": "탑소라카" };
    const API_KEY = "Bearer eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiIsIng1dCI6IktYMk40TkRDSTJ5NTA5NWpjTWk5TllqY2lyZyIsImtpZCI6IktYMk40TkRDSTJ5NTA5NWpjTWk5TllqY2lyZyJ9.eyJpc3MiOiJodHRwczovL2x1ZHkuZ2FtZS5vbnN0b3ZlLmNvbSIsImF1ZCI6Imh0dHBzOi8vbHVkeS5nYW1lLm9uc3RvdmUuY29tL3Jlc291cmNlcyIsImNsaWVudF9pZCI6IjEwMDAwMDAwMDA1OTA2ODYifQ.oGh7TNKFkdANL7nZJbKMAqjmQBO_EauyWaRDuq0QJQ2l0sABfpTTKvYEdkixZ8hZqW5iVN_mDIsYdI6pcnIJ-w3j7EFTI8GKdUNo-QVn412LALUhx_gXd-a2WekBYtDgjZAaAfmjqal63JjfoXdJYz5mNRZX9bqkcpuX7gkSDU9bi7Bvik4gmT4kEt6WJ1sOnch8Bbi3bDGLUoXEbRjWiebszAdo2qmsg6sXu3Ah26PhMsosIzkPaW0y5wBDnSOQtt2N4sEFNO0jiwzfaygOO4pu6jQFzTsUjL4xNBKtqpB1HS5gpxadAwJD1umBEMaF-BQZEu3pdu9Ja8MvDpqfUg"; 
    const BASE_URL = "https://developer-lostark.game.onstove.com";

    function init() {
        const menu = document.getElementById('tabMenu');
        const container = document.getElementById('tabContents');
        Object.keys(MEMBERS).forEach(name => {
            const btn = document.createElement('button'); btn.className = 'tab-btn'; btn.innerText = name;
            btn.onclick = (e) => openTab(e, name); menu.appendChild(btn);
            const content = document.createElement('div'); content.id = name; content.className = 'content';
            content.style.display = "none";
            content.innerHTML = `
                <div class="list-header">
                    <div>캐릭터</div><div>서버</div><div>레벨</div><div>아크패시브</div><div>아크그리드</div><div>보석 현황</div>
                </div>
                <div id="list-${name}"></div>`;
            container.appendChild(content);
        });
    }

    async function openTab(evt, tabName) {
        document.querySelectorAll(".content").forEach(c => c.style.display = "none");
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        document.getElementById(tabName).style.display = "block";
        evt.currentTarget.classList.add("active");
        if (MEMBERS[tabName]) fetchListData(tabName, MEMBERS[tabName]);
    }

    async function fetchListData(mName, cName) {
        const listContainer = document.getElementById(`list-${mName}`);
        listContainer.innerHTML = '<div class="loading">데이터 로드 중...</div>';
        const headers = { "accept": "application/json", "Authorization": API_KEY };

        try {
            const sibRes = await fetch(`${BASE_URL}/characters/${encodeURIComponent(cName)}/siblings`, { headers });
            const siblings = await sibRes.json();
            const targets = siblings.filter(c => parseFloat(c.ItemAvgLevel.replace(/,/g, "")) >= 1640).sort((a,b) => parseFloat(b.ItemAvgLevel.replace(/,/g, "")) - parseFloat(a.ItemAvgLevel.replace(/,/g, "")));

            listContainer.innerHTML = "";
            for (const char of targets) {
                const [apRes, agRes, gRes] = await Promise.all([
                    fetch(`${BASE_URL}/armories/characters/${encodeURIComponent(char.CharacterName)}/arkpassive`, { headers }),
                    fetch(`${BASE_URL}/armories/characters/${encodeURIComponent(char.CharacterName)}/arkgrid`, { headers }),
                    fetch(`${BASE_URL}/armories/characters/${encodeURIComponent(char.CharacterName)}/gems`, { headers })
                ]);

                const apData = await apRes.json();
                const agData = await agRes.json();
                const gData = await gRes.json();

                // 1. 아크패시브 (색상 지정 및 6R 미만 강조)
                let apHtml = "비활성화";
                if (apData?.Points) {
                    apHtml = apData.Points.map(p => {
                        let fName = "진화"; let fColor = "var(--ap-jin)";
                        if (p.Name.startsWith("깨")) { fName = "깨달음"; fColor = "var(--ap-kkae)"; }
                        else if (p.Name.startsWith("도")) { fName = "도약"; fColor = "var(--ap-do)"; }

                        const rank = parseInt((p.Description || "").match(/(\d+)랭크/)?.[1] || 0);
                        let rankStyle = rank < 6 ? `color:var(--danger); font-weight:900;` : `color:var(--text);`;
                        
                        return `<span style="color:${fColor}">${fName}</span> <span style="${rankStyle}">${rank}R</span>`;
                    }).join(" / ");
                }

                // 2. 아크그리드 (질서/혼돈 줄바꿈 및 상아색 적용)
                let agOrder = []; let agChaos = [];
                if (agData?.Slots) {
                    agData.Slots.forEach(s => {
                        let fColor = 'var(--grade-default)';
                        if (s.Grade === "고대") fColor = 'var(--grade-ancient)';
                        else if (s.Grade === "유물") fColor = 'var(--grade-relic)';
                        else if (s.Grade === "전설") fColor = 'var(--grade-legend)';
                        else if (s.Grade === "영웅") fColor = 'var(--grade-epic)';
                        
                        const slotHtml = `<div class="ag-slot"><img src="${s.Icon}" class="ag-icon"><span style="color:${fColor}; font-weight:800;">${s.Point}P</span></div>`;
                        if (s.Name.includes("혼돈")) agChaos.push(slotHtml); else agOrder.push(slotHtml);
                    });
                }
                const agHtml = `
                    <div class="ag-group">${agOrder.join("")}</div>
                    <div class="ag-group">${agChaos.join("")}</div>
                `;

                // 3. 보석 (6레벨 광휘 표기 수정 및 위치 이동)
                let gemSummary = "없음";
                if (gData?.Gems) {
                    const gemMap = {};
                    gData.Gems.forEach(g => {
                        let type = "";
                        if (g.Name.includes("겁화")) type = "겁화";
                        else if (g.Name.includes("작열")) type = "작열";
                        else if (g.Name.includes("광휘")) type = "광휘";
                        else if (g.Name.includes("멸화")) type = "멸화";
                        else if (g.Name.includes("홍염")) type = "홍염";
                        
                        const key = `${g.Level}레벨 ${type}`;
                        gemMap[key] = (gemMap[key] || 0) + 1;
                    });
                    gemSummary = Object.entries(gemMap).sort((a,b) => parseInt(b[0]) - parseInt(a[0])).map(([n, c]) => `${n} ${c}개`).join(", ");
                }

                const row = document.createElement('div');
                row.className = 'list-row';
                row.innerHTML = `
                    <div class="char-info"><span class="char-name">${char.CharacterName}</span><span style="font-size:0.75rem; color:#888;">${char.CharacterClassName}</span></div>
                    <div>${char.ServerName}</div>
                    <div class="level">${char.ItemAvgLevel}</div>
                    <div class="ap-box">${apHtml}</div>
                    <div class="ag-box">${agHtml}</div>
                    <div class="gem-box"><div class="gem-text">${gemSummary}</div></div>
                `;
                listContainer.appendChild(row);
            }
        } catch (e) { listContainer.innerHTML = "에러 발생"; }
    }
    window.onload = init;
</script>
</body>
</html>
