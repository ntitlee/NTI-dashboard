<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>LOA NTI Dashboard - Advanced</title>
    <style>
        :root { 
            --bg: #121212; --card-bg: #1e1e1e; --border: #333;
            --text: #e0e0e0; --primary: #4285f4; --danger: #ff4d4f;
        }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--text); }
        .container { max-width: 1800px; margin: 0 auto; }
        
        .tabs { display: flex; flex-wrap: wrap; border-bottom: 1px solid var(--border); margin-bottom: 20px; gap: 5px; }
        .tab-btn { padding: 10px 20px; cursor: pointer; border: none; background: #2a2a2a; color: #888; border-radius: 8px 8px 0 0; font-weight: 700; }
        .tab-btn.active { background: var(--primary); color: white; }

        /* 리스트 레이아웃 (전투력/최대 전투력 열 추가) */
        .list-header, .list-row { 
            display: grid; 
            grid-template-columns: 180px 100px 100px 150px 220px 280px 250px 1fr; 
            gap: 10px; align-items: center; text-align: center; font-size: 0.85rem;
        }
        .list-header { background: #252525; padding: 12px; font-weight: 800; border-bottom: 2px solid var(--border); }
        .list-row { background: var(--card-bg); padding: 15px 12px; border-bottom: 1px solid var(--border); }
        .list-row:hover { background: #2a2a2a; }

        .char-info { text-align: left; }
        .char-name { font-weight: 800; color: #fff; display: block; }
        .level { font-weight: 800; color: var(--primary); }
        
        /* 전투력 히스토리 스타일 */
        .history-tag { cursor: help; border-bottom: 1px dashed #666; color: #aaa; font-size: 0.8rem; margin: 0 2px; }
        
        .ap-box, .ag-box, .gem-box { text-align: left; line-height: 1.5; }
        .ag-group { margin-bottom: 4px; display: block; }
        .ag-slot { display: inline-flex; align-items: center; margin-right: 10px; }
        .ag-icon { width: 14px; height: 14px; margin-right: 3px; }
        .loading { text-align: center; padding: 50px; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="color: #fff; margin-bottom: 25px;">📊 LOA NTI Dashboard</h1>
    <div class="tabs" id="tabMenu"><button class="tab-btn active" onclick="openTab(event, 'NTI')">NTI 전체</button></div>
    <div id="tabContents"></div>
</div>

<script>
    const MEMBERS = { "기태": "로우프", "동근": "저녁별빛", "민구": "그저애송이", "민기": "minki", "석준": "famousamos", "준영": "DD키리", "찬엽": "탑소라카" };
    const API_KEY = "Bearer eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiIsIng1dCI6IktYMk40TkRDSTJ5NTA5NWpjTWk5TllqY2lyZyIsImtpZCI6IktYMk40TkRDSTJ5NTA5NWpjTWk5TllqY2lyZyJ9.eyJpc3MiOiJodHRwczovL2x1ZHkuZ2FtZS5vbnN0b3ZlLmNvbSIsImF1ZCI6Imh0dHBzOi8vbHVkeS5nYW1lLm9uc3RvdmUuY29tL3Jlc291cmNlcyIsImNsaWVudF9pZCI6IjEwMDAwMDAwMDA1OTA2ODYifQ.oGh7TNKFkdANL7nZJbKMAqjmQBO_EauyWaRDuq0QJQ2l0sABfpTTKvYEdkixZ8hZqW5iVN_mDIsYdI6pcnIJ-w3j7EFTI8GKdUNo-QVn412LALUhx_gXd-a2WekBYtDgjZAaAfmjqal63JjfoXdJYz5mNRZX9bqkcpuX7gkSDU9bi7Bvik4gmT4kEt6WJ1sOnch8Bbi3bDGLUoXEbRjWiebszAdo2qmsg6sXu3Ah26PhMsosIzkPaW0y5wBDnSOQtt2N4sEFNO0jiwzfaygOO4pu6jQFzTsUjL4xNBKtqpB1HS5gpxadAwJD1umBEMaF-BQZEu3pdu9Ja8MvDpqfUg"; 
    const BASE_URL = "https://developer-lostark.game.onstove.com";

    function init() {
        const menu = document.getElementById('tabMenu');
        const container = document.getElementById('tabContents');
        Object.keys(MEMBERS).forEach(name => {
            const btn = document.createElement('button'); btn.className = 'tab-btn'; btn.innerText = name;
            btn.onclick = (e) => openTab(e, name); menu.appendChild(btn);
            const content = document.createElement('div'); content.id = name; content.className = 'content';
            content.style.display = "none";
            content.innerHTML = `
                <div class="list-header">
                    <div>캐릭터</div><div>서버</div><div>레벨</div><div>전투력</div><div>최대 전투력(TOP3)</div><div>아크패시브</div><div>아크그리드</div><div>보석 현황</div>
                </div>
                <div id="list-${name}"></div>`;
            container.appendChild(content);
        });
    }

    // [전투력 히스토리 저장 로직]
    function updateCombatHistory(charName, currentCP) {
        const key = `CP_HISTORY_${charName}`;
        let history = JSON.parse(localStorage.getItem(key)) || [];
        const now = new Date();
        const timestamp = `${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

        // 1. 현재 값이 히스토리 중 가장 큰 값보다 크면 갱신
        if (history.length === 0 || currentCP > history[0].value) {
            history.unshift({ value: currentCP, time: timestamp });
            if (history.length > 3) history.pop(); // 최대 3개 유지
            localStorage.setItem(key, JSON.stringify(history));
        }
        return history;
    }

    async function openTab(evt, tabName) {
        document.querySelectorAll(".content").forEach(c => c.style.display = "none");
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        document.getElementById(tabName).style.display = "block";
        evt.currentTarget.classList.add("active");
        if (MEMBERS[tabName]) fetchListData(tabName, MEMBERS[tabName]);
    }

    async function fetchListData(mName, cName) {
        const listContainer = document.getElementById(`list-${mName}`);
        listContainer.innerHTML = '<div class="loading">데이터 로드 중...</div>';
        const headers = { "accept": "application/json", "Authorization": API_KEY };

        try {
            const sibRes = await fetch(`${BASE_URL}/characters/${encodeURIComponent(cName)}/siblings`, { headers });
            const siblings = await sibRes.json();
            const targets = siblings.filter(c => parseFloat(c.ItemAvgLevel.replace(/,/g, "")) >= 1640).sort((a,b) => parseFloat(b.ItemAvgLevel.replace(/,/g, "")));

            listContainer.innerHTML = "";
            for (const char of targets) {
                const [pRes, apRes, agRes, gRes] = await Promise.all([
                    fetch(`${BASE_URL}/armories/characters/${encodeURIComponent(char.CharacterName)}/profiles`, { headers }),
                    fetch(`${BASE_URL}/armories/characters/${encodeURIComponent(char.CharacterName)}/arkpassive`, { headers }),
                    fetch(`${BASE_URL}/armories/characters/${encodeURIComponent(char.CharacterName)}/arkgrid`, { headers }),
                    fetch(`${BASE_URL}/armories/characters/${encodeURIComponent(char.CharacterName)}/gems`, { headers })
                ]);

                const pData = await pRes.json();
                const apData = await apRes.json();
                const agData = await agRes.json();
                const gData = await gRes.json();

                // 1. 전투력 & 히스토리
                let cpRaw = pData?.CombatPower || "0";
                let cpValue = parseInt(String(cpRaw).replace(/,/g, ""));
                let cpHistory = updateCombatHistory(char.CharacterName, cpValue);
                let historyHtml = cpHistory.map(h => `<span class="history-tag" title="갱신일시: ${h.time}">${h.value.toLocaleString()}</span>`).join(" ");

                // 2. 아크패시브 (흰색 글씨, 5R 이하만 빨간 볼드)
                let apHtml = "비활성화";
                if (apData?.Points) {
                    apHtml = apData.Points.map(p => {
                        let fName = p.Name.startsWith("진") ? "진화" : p.Name.startsWith("깨") ? "깨달음" : "도약";
                        const r = parseInt((p.Description || "").match(/(\d+)랭크/)?.[1] || 0);
                        let style = r <= 5 ? `color:var(--danger); font-weight:900;` : `color:#fff;`;
                        return `<span style="${style}">${fName} ${r}R</span>`;
                    }).join(" / ");
                }

                // 3. 아크그리드 (14P 이하 빨강, 그외 흰색 / 줄바꿈 적용)
                let agOrder = []; let agChaos = [];
                if (agData?.Slots) {
                    agData.Slots.forEach(s => {
                        let style = s.Point <= 14 ? `color:var(--danger); font-weight:800;` : `color:#fff;`;
                        const slot = `<div class="ag-slot"><img src="${s.Icon}" class="ag-icon"><span style="${style}">${s.Point}P</span></div>`;
                        if (s.Name.includes("혼돈")) agChaos.push(slot); else agOrder.push(slot);
                    });
                }
                const agHtml = `<div class="ag-group">${agOrder.join("")}</div><div class="ag-group">${agChaos.join("")}</div>`;

                // 4. 보석 (귀속 여부 포함 상세 분류)
                let gemSummary = "없음";
                if (gData?.Gems) {
                    const gemMap = {};
                    gData.Gems.forEach(g => {
                        let type = g.Name.includes("겁화") ? "겁화" : g.Name.includes("작열") ? "작열" : g.Name.includes("광휘") ? "광휘" : "보석";
                        let bind = g.Name.includes("귀속") ? "(귀속)" : "";
                        const key = `${g.Level}레벨 ${type}${bind}`;
                        gemMap[key] = (gemMap[key] || 0) + 1;
                    });
                    gemSummary = Object.entries(gemMap).sort((a,b) => parseInt(b[0]) - parseInt(a[0])).map(([n, c]) => `${n} ${c}개`).join(", ");
                }

                const row = document.createElement('div');
                row.className = 'list-row';
                row.innerHTML = `
                    <div class="char-info"><span class="char-name">${char.CharacterName}</span><span style="font-size:0.75rem; color:#888;">${char.CharacterClassName}</span></div>
                    <div>${char.ServerName}</div>
                    <div class="level">${char.ItemAvgLevel}</div>
                    <div style="font-weight:700;">${cpValue.toLocaleString()}</div>
                    <div style="font-size:0.8rem;">${historyHtml}</div>
                    <div class="ap-box">${apHtml}</div>
                    <div class="ag-box">${agHtml}</div>
                    <div class="gem-box" style="font-size:0.8rem; color:#bbb;">${gemSummary}</div>
                `;
                listContainer.appendChild(row);
            }
        } catch (e) { listContainer.innerHTML = "에러 발생"; console.error(e); }
    }
    window.onload = init;
</script>
</body>
</html>
